<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Работа в Европе — €1800–2400/мес чистыми — HR & Recruit</title>
  <meta name="description" content="20 проверенных вакансий в 5 странах ЕС и UK. Сельское хозяйство, заводы, отели. Контракт, жильё, оплата от €1800 чистыми.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <style>
    /* Page-specific hero refinements */
    .home-hero {
      padding-top: 56px;
      padding-bottom: 48px;
      background: linear-gradient(to bottom, var(--warm-bg) 0%, var(--bg) 100%);
    }
    .home-hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: var(--r-pill);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--ink-soft);
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }
    .home-hero-eyebrow-dot {
      width: 8px; height: 8px; background: var(--trust); border-radius: 50%;
      animation: pulse 1.6s infinite;
    }
    .home-hero-title {
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      line-height: 0.96;
      letter-spacing: -0.04em;
      font-weight: 800;
      margin-bottom: 20px;
      max-width: 14ch;
    }
    .home-hero-title em {
      font-family: var(--font-accent);
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: -0.01em;
    }
    .home-hero-meta {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 32px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
    }
    .home-hero-meta-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.875rem;
      color: var(--ink-soft);
    }
    .home-hero-meta-item strong {
      font-weight: 700;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }
    .home-hero-meta-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
    }

    /* country teaser strip (horizontal pills under hero) */
    .country-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-top: 32px;
    }
    .country-pill {
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 16px;
      text-decoration: none;
      color: inherit;
      transition: all var(--dur) var(--ease);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .country-pill:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .country-pill-code {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--ink-mute);
    }
    .country-pill-name {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .country-pill-rate {
      font-size: 0.8125rem;
      color: var(--accent);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      margin-top: 2px;
    }

    @media (max-width: 1024px) {
      .country-strip { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 640px) {
      .country-strip { grid-template-columns: 1fr 1fr; gap: 8px; }
    }
  </style>
</head>
<body>

        <div class="calc-control">

          <div class="calc-breakdown-row">

<script>
  /* ========= COUNTRY DATA (rate ranges per country for calc) ========= */
  const CALC_DATA = {
    uk:          { gross: 2600, tax: 0.21, label: { ru: "Великобритания", uk: "Велика Британія", en: "United Kingdom" } },
    germany:     { gross: 2900, tax: 0.31, label: { ru: "Германия",       uk: "Німеччина",       en: "Germany" } },
    netherlands: { gross: 2950, tax: 0.27, label: { ru: "Нидерланды",     uk: "Нідерланди",      en: "Netherlands" } },
    czechia:     { gross: 1900, tax: 0.18, label: { ru: "Чехия",          uk: "Чехія",           en: "Czechia" } },
    denmark:     { gross: 3700, tax: 0.27, label: { ru: "Дания",          uk: "Данія",           en: "Denmark" } },
    norway:      { gross: 4500, tax: 0.26, label: { ru: "Норвегия",       uk: "Норвегія",        en: "Norway" } },
    switzerland: { gross: 5000, tax: 0.20, label: { ru: "Швейцария",      uk: "Швейцарія",       en: "Switzerland" } },
    greece:      { gross: 2200, tax: 0.15, label: { ru: "Греция",         uk: "Греція",          en: "Greece" } },
    italy:       { gross: 2400, tax: 0.20, label: { ru: "Италия",         uk: "Італія",          en: "Italy" } },
  };

  let calcState = { country: "uk", duration: 6, effort: 1, expenses: 0 };

  function fmt(n) {
    return "€" + new Intl.NumberFormat("en-GB").format(Math.round(n));
  }
  function fmtNeg(n) { return "−€" + new Intl.NumberFormat("en-GB").format(Math.round(n)); }

  function updateCalc() {
    const c = CALC_DATA[calcState.country];
    const effortMult = [1.0, 1.18, 1.42][calcState.effort];  // 0, +18%, +42%
    const dur = calcState.duration;
    const gross = c.gross * effortMult * dur;
    const tax = gross * c.tax;
    const exp = calcState.expenses * dur;
    const net = gross - tax - exp;

    document.getElementById("calcResult").textContent = fmt(net);
    document.getElementById("calcBrkGross").textContent = fmt(gross);
    document.getElementById("calcBrkTax").textContent = fmtNeg(tax);
    document.getElementById("calcBrkExp").textContent = exp ? fmtNeg(exp) : "€0";
    document.getElementById("calcBrkNet").textContent = fmt(net);

    const lang = getLang();
    document.getElementById("calcCountryName").textContent = c.label[lang] || c.label.ru;
    document.getElementById("calcDurationName").textContent = dur + " " + (lang==='en' ? 'months' : (lang==='uk' ? 'місяців' : 'месяцев'));
  }

  /* ========= RENDER ========= */
  function renderHomeDynamic() {
    const lang = getLang();

    // Country teaser strip
    const strip = document.getElementById("countryStrip");
    if (strip) {
      strip.innerHTML = SITE.countries.map(c => `
        <a href="#vacancies" class="country-pill" onclick="selectVacTab('${c.slug}'); return true;">
          <span class="country-pill-code">${c.code}</span>
          <span class="country-pill-name">${countryName(c, lang)}</span>
          <span class="country-pill-rate">€${c.rate} ${t('misc.currency')}</span>
        </a>
      `).join("");
    }

    // Vacancy tabs and panels
    const tabs = document.getElementById("vacTabs");
    const panels = document.getElementById("vacPanels");
    if (tabs && panels && window.VACANCIES) {
      tabs.innerHTML = SITE.countries.map((c, i) => `
        <button class="vac-tab ${i===0 ? 'is-active' : ''}" data-tab="${c.slug}" onclick="selectVacTab('${c.slug}')">
          <span class="vac-tab-flag">${c.code}</span>
          <span class="vac-tab-name">${countryName(c, lang)}</span>
          <span class="vac-tab-rate">€${c.rate}</span>
          <span class="vac-tab-count">${c.count}</span>
        </button>
      `).join("");

      panels.innerHTML = SITE.countries.map((c, i) => {
        const vacs = window.VACANCIES.filter(v => v.country === c.slug);
        return `
          <div class="vac-panel ${i===0 ? 'is-active' : ''}" id="panel-${c.slug}">
            <div class="vac-panel-grid">
              ${vacs.map(v => `
                <a href="vacancy.html?id=${v.id}" class="rate-card">
                  <div class="rate-card-media">
                    <img src="${v.img}" alt="${v.title}">
                    <div class="rate-card-country-chip">${c.code}</div>
                    <div class="rate-card-rate-badge">
                      <div class="rate-card-rate-num">${fmtEur(v.rate)}</div>
                      <div class="rate-card-rate-label">${t('misc.perMonth')}</div>
                    </div>
                  </div>
                  <div class="rate-card-body">
                    <div class="rate-card-name">${v.title}</div>
                    <div class="rate-card-meta">
                      <span>${v.city}</span>
                      <span class="rate-card-meta-dot"></span>
                      <span>${v.contract}</span>
                    </div>
                    <div class="rate-card-cta">
                      <span>${t('misc.details')}</span>
                      <span>→</span>
                    </div>
                  </div>
                </a>
              `).join("")}
            </div>
          </div>
        `;
      }).join("");
    }

    // Countries section (large cards)
    const grid = document.getElementById("countriesGrid");
    if (grid) {
      grid.innerHTML = SITE.countries.map((c, idx) => `
        <a href="country.html?c=${c.slug}" class="country-card ${idx === 0 ? 'size-lg' : ''}">
          <div class="country-flag-row">
            <span class="country-flag-code">${c.code}</span>
            <span class="country-flag-name">${countryName(c, lang)}</span>
          </div>
          <h3 class="country-name">${countryName(c, lang)}</h3>
          <p class="country-tagline">${countryTag(c, lang)}</p>
          <div class="country-meta">
            <div>
              <div class="country-meta-stat-num">€${c.rate.split("–")[1]}</div>
              <div class="country-meta-stat-label">${lang==='ru' ? 'до €/мес' : (lang==='uk' ? 'до €/міс' : 'up to €/mo')}</div>
            </div>
            <div style="text-align: right;">
              <div class="country-meta-stat-num">${c.count}</div>
              <div class="country-meta-stat-label">${t('misc.vacancies')}</div>
            </div>
            <div class="country-meta-arrow">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9h12M10 4l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
        </a>
      `).join("");
    }

    // Cases — top 3 with money amounts
    const casesRow = document.getElementById("casesRow");
    if (casesRow && window.CASES) {
      const tags = ["UK · Norfolk", "GR · Crete", "NL · Westland"];
      const amounts = ["€11,500", "€10,200", "€12,400"];
      const periods = ["6 мес", "5 мес", "8 мес"];
      casesRow.innerHTML = window.CASES.slice(0, 3).map((c, i) => `
        <div class="case-tile">
          <div class="case-tile-media">
            <img src="${c.img}" alt="${c.name}">
            <div class="case-tile-tag">${tags[i] || ''}</div>
            <div class="case-tile-amount">${amounts[i] || ''}</div>
            <div class="case-tile-play">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M4 2l8 5-8 5z"/></svg>
            </div>
          </div>
          <div class="case-tile-body">
            <p class="case-tile-quote">"${c.quote.split('.').slice(0,2).join('.')}."</p>
            <div class="case-tile-author">
              <div class="case-tile-name">${c.name}</div>
              <div class="case-tile-role">${c.role} · ${periods[i] || ''}</div>
            </div>
          </div>
        </div>
      `).join("");
    }

    // FAQ
    const faqList = document.getElementById("faqList");
    if (faqList) {
      const items_ru = [
        { q: "Сколько реально можно заработать?", a: "В UK — €1900–2400/мес чистыми. В ЕС — €1800–2200/мес. На отелях в Греции и Италии плюс чаевые (€100–400/мес). На фермах UK с понаднормовыми реально €2400 за хороший месяц." },
        { q: "Сколько стоит уехать?", a: "Подбор и собеседование — бесплатно. Платите только за документы (€200–300) и встречу в аэропорту (€150–250). И только после того как у вас на руках job offer." },
        { q: "Что если работодатель откажет?", a: "Если не по вашей вине — возврат 100%. Через Stripe — на ту же карту, что платили. Сроки 5–10 рабочих дней." },
        { q: "Жильё включено?", a: "Везде, кроме некоторых вакансий в ЕС где удержание €60–120/нед из зарплаты. Всегда указано в карточке вакансии." },
        { q: "Сколько времени готовят документы?", a: "UK — 4–6 недель. ЕС — 2–4 недели. Зависит от консульства и сезона." },
        { q: "Нужен ли английский?", a: "Для ферм и фабрик — нет. Для отелей в Греции и Италии — базовый А1 желательно. Для официантов — B1." },
      ];
      const items_uk = [
        { q: "Скільки реально можна заробити?", a: "В UK — €1900–2400/міс чистими. В ЄС — €1800–2200/міс. В готелях Греції та Італії плюс чайові (€100–400/міс). На фермах UK з понаднормовими реально €2400 за хороший місяць." },
        { q: "Скільки коштує поїхати?", a: "Підбір та співбесіда — безкоштовно. Платите тільки за документи (€200–300) і зустріч в аеропорту (€150–250). І тільки після того як у вас на руках job offer." },
        { q: "Що якщо роботодавець відмовить?", a: "Якщо не з вашої вини — повернення 100%. Через Stripe — на ту ж картку, з якої платили. Терміни 5–10 робочих днів." },
        { q: "Чи включене житло?", a: "Усюди, крім деяких вакансій в ЄС, де утримання €60–120/тиж із зарплати. Завжди вказано у картці вакансії." },
        { q: "Скільки часу готують документи?", a: "UK — 4–6 тижнів. ЄС — 2–4 тижні. Залежить від консульства та сезону." },
        { q: "Чи потрібна англійська?", a: "Для ферм і фабрик — ні. Для готелів у Греції та Італії — базовий А1 бажано. Для офіціантів — B1." },
      ];
      const items_en = [
        { q: "How much can I really earn?", a: "In UK — €1,900–2,400/mo net. In EU — €1,800–2,200/mo. Greek and Italian hotels add tips (€100–400/mo). UK farms with overtime can reach €2,400 in a good month." },
        { q: "How much does it cost to go?", a: "Job placement and interviews — free. You only pay for documents (€200–300) and airport pickup (€150–250). And only once you have a job offer in hand." },
        { q: "What if the employer rejects me?", a: "If not your fault — 100% refund. Via Stripe — back to the same card you paid with. 5–10 business days." },
        { q: "Is accommodation included?", a: "Everywhere except some EU jobs where €60–120/week is deducted from salary. Always shown in the job card." },
        { q: "How long do documents take?", a: "UK — 4–6 weeks. EU — 2–4 weeks. Depends on the consulate and season." },
        { q: "Do I need English?", a: "For farms and factories — no. For hotels in Greece and Italy — basic A1 is desirable. For waiter positions — B1." },
      ];
      const list = lang === 'uk' ? items_uk : (lang === 'en' ? items_en : items_ru);
      faqList.innerHTML = list.map(f => `
        <div class="faq-item">
          <div class="faq-q">
            <span>${f.q}</span>
            <span class="faq-toggle"></span>
          </div>
          <div class="faq-a">${f.a}</div>
        </div>
      `).join("");
    }

    // Country select in form
    const select = document.getElementById("formCountrySelect");
    if (select) {
      [...select.querySelectorAll('option:not([data-i18n])')].forEach(o => o.remove());
      SITE.countries.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.slug;
        opt.textContent = countryName(c, lang);
        select.appendChild(opt);
      });
    }

    updateCalc();
  }

  /* ========= TAB SWITCHING ========= */
  function selectVacTab(slug) {
    document.querySelectorAll(".vac-tab").forEach(t => t.classList.toggle("is-active", t.dataset.tab === slug));
    document.querySelectorAll(".vac-panel").forEach(p => p.classList.toggle("is-active", p.id === "panel-" + slug));
  }

  /* ========= CALCULATOR CONTROLS ========= */
  function bindCalc() {
    // Country buttons (dynamic)
    const countryEl = document.getElementById("calcCountry");
    countryEl.innerHTML = SITE.countries.map((c, i) => `
      <button class="calc-opt ${i===0 ? 'is-active' : ''}" data-country="${c.slug}">
        ${c.code}
      </button>
    `).join("");

    document.querySelectorAll("[data-country]").forEach(b => {
      b.addEventListener("click", () => {
        document.querySelectorAll("[data-country]").forEach(x => x.classList.remove("is-active"));
        b.classList.add("is-active");
        calcState.country = b.dataset.country;
        updateCalc();
      });
    });
    document.querySelectorAll("[data-dur]").forEach(b => {
      b.addEventListener("click", () => {
        document.querySelectorAll("[data-dur]").forEach(x => x.classList.remove("is-active"));
        b.classList.add("is-active");
        calcState.duration = parseInt(b.dataset.dur);
        updateCalc();
      });
    });
    document.querySelectorAll("[data-eff]").forEach(b => {
      b.addEventListener("click", () => {
        document.querySelectorAll("[data-eff]").forEach(x => x.classList.remove("is-active"));
        b.classList.add("is-active");
        calcState.effort = parseInt(b.dataset.eff);
        updateCalc();
      });
    });
    document.querySelectorAll("[data-exp]").forEach(b => {
      b.addEventListener("click", () => {
        document.querySelectorAll("[data-exp]").forEach(x => x.classList.remove("is-active"));
        b.classList.add("is-active");
        calcState.expenses = parseInt(b.dataset.exp);
        updateCalc();
      });
    });
  }

  initSite("home");
  renderHomeDynamic();
  bindCalc();
  initFAQ();

  document.addEventListener("langchange", () => {
    renderHomeDynamic();
    bindCalc();
    initFAQ();
  });
</script>

</body>
</html>
