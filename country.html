  <style>
    /* Page-local refinements */
    .country-hero {
      position: relative;
      padding: 80px 0 64px;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
    }
    .country-hero-meta {
      display: flex; align-items: center; gap: 16px;
      font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.12em;
      color: var(--ink-mute); text-transform: uppercase; margin-bottom: 24px;
    }
    .country-hero-meta-code {
      background: var(--bg-dark); color: var(--bg); padding: 4px 10px; border-radius: 4px;
      font-weight: 500;
    }
    .country-hero-title {
      font-size: clamp(3.5rem, 9vw, 8rem);
      line-height: 0.92; letter-spacing: -0.03em;
      font-variation-settings: "opsz" 144;
      margin-bottom: 32px;
    }
    .country-hero-title em { font-style: italic; color: var(--accent); font-variation-settings: "opsz" 144, "SOFT" 70; }

    .country-hero-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 64px;
      align-items: end;
    }
    .country-hero-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border: 1px solid var(--line-strong);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .country-hero-stat {
      padding: 24px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .country-hero-stat:nth-child(2n) { border-right: 0; }
    .country-hero-stat:nth-last-child(-n+2) { border-bottom: 0; }
    .country-hero-stat-num {
      font-family: var(--font-display); font-size: 2.25rem;
      font-variation-settings: "opsz" 48; line-height: 1; margin-bottom: 6px;
      letter-spacing: -0.015em;
    }
    .country-hero-stat-label {
      font-size: 0.8125rem; color: var(--ink-mute);
    }

    .country-image-band {
      width: 100%;
      height: clamp(280px, 40vh, 480px);
      background-size: cover; background-position: center;
      position: relative;
      border-bottom: 1px solid var(--line);
    }
    .country-image-band::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 60%, rgba(245, 241, 232, 0.4));
    }
    .country-image-band-caption {
      position: absolute; left: 32px; bottom: 24px;
      font-family: var(--font-mono); font-size: 0.7rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--bg); background: rgba(0,0,0,0.5);
      padding: 8px 14px; border-radius: 4px;
      backdrop-filter: blur(4px);
    }

    /* Vacancy filters */
    .vacancy-filters {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .filter-chip {
      padding: 8px 16px;
      border: 1px solid var(--line-strong);
      border-radius: 100px;
      font-size: 0.875rem; font-weight: 500;
      background: transparent;
      transition: all var(--dur) var(--ease);
      cursor: pointer;
    }
    .filter-chip:hover { background: var(--bg-elev); }
    .filter-chip.is-active { background: var(--bg-dark); color: var(--bg); border-color: var(--bg-dark); }

    /* Country info cards */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .info-card {
      background: var(--bg-elev);
      padding: 32px;
    }
    .info-card-icon {
      width: 40px; height: 40px;
      background: var(--bg-dark); color: var(--bg);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-style: italic;
      font-size: 1.125rem;
      margin-bottom: 20px;
    }
    .info-card-title {
      font-family: var(--font-display); font-size: 1.375rem;
      letter-spacing: -0.01em; margin-bottom: 10px;
      line-height: 1.15;
    }
    .info-card-text { font-size: 0.9375rem; color: var(--ink-soft); line-height: 1.55; }

    @media (max-width: 1024px) {
      .country-hero-grid { grid-template-columns: 1fr; gap: 40px; }
      .info-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .country-hero-stats { grid-template-columns: 1fr; }
      .country-hero-stat { border-right: 0 !important; }
    }
  </style>
</head>
